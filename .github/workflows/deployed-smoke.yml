name: Deployed Smoke

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      base_url:
        description: Fully qualified deployed app URL to smoke test.
        required: true

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    name: Playwright deployed smoke
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.deployment_status.state == 'success' &&
        github.event.deployment.environment == 'Production'
      )
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || vars.PRODUCTION_BASE_URL || github.event.deployment_status.environment_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Validate smoke target
        run: |
          if [ -z "$PLAYWRIGHT_BASE_URL" ]; then
            echo "PLAYWRIGHT_BASE_URL is required."
            echo "Set PRODUCTION_BASE_URL as a repository variable or provide base_url for manual runs."
            exit 1
          fi

          case "$PLAYWRIGHT_BASE_URL" in
            http://*|https://*) ;;
            *)
              echo "PLAYWRIGHT_BASE_URL must be an absolute http(s) URL."
              exit 1
              ;;
          esac

      - name: Run deployed browser smoke tests
        run: npm run test:e2e

      - name: Create or update smoke failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          SMOKE_TARGET: ${{ env.PLAYWRIGHT_BASE_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          issue_title="Production smoke test failed"
          issue_body="$(cat <<BODY
          The production smoke test failed.

          - Target: ${SMOKE_TARGET}
          - Workflow run: ${RUN_URL}
          - Commit: ${GITHUB_SHA}

          Review the workflow logs, confirm the deployed app loads, and update this issue with the resolution.
          BODY
          )"

          issue_number="$(gh issue list --state open --search "${issue_title} in:title" --json number --jq '.[0].number')"

          if [ -n "$issue_number" ]; then
            gh issue comment "$issue_number" --body "$issue_body"
          else
            gh issue create --title "$issue_title" --body "$issue_body"
          fi
